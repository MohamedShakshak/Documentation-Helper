services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LLM__OLLAMA_BASE_URL=http://host.docker.internal:11434
      - VECTOR_STORE__CHROMA_PERSIST_DIR=/data/chroma_db
      - DATABASE__URL=sqlite:///data/doc_helper.db
    volumes:
      - doc_helper_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000/api
    depends_on:
      api:
        condition: service_healthy
    command: ["streamlit", "run", "src/doc_helper/ui/streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]

volumes:
  doc_helper_data: